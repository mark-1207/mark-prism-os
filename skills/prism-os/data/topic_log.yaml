  - {"thesis": "数据显示2024年科技行业30%的内容创作者岗位被AI替代，流水线工人岗位只下降5%——反差表明判断力比执行力更难被替代", "candidates_count": 8, "entropy_score": -1, "candidates": [{"title": "AI取代不了的，是你的判断力！", "dimension": ""}, {"title": "创意岗位比流水线更安全？AI不这么想！", "dimension": ""}, {"title": "AI时代，流水线工人比创意人才更稳定？", "dimension": ""}, {"title": "你是内容创作者吗？AI正在抢走你的饭碗，但流水线工人笑了", "dimension": ""}, {"title": "AI占领30%创意岗位，流水线工人仅降5%，背后真相你想不到！", "dimension": ""}], "ccos_outline": {"wechat_cognitive_outline": {"内容目标": "认知升级", "用户动机": "好奇", "核心认知冲突": "实际上，AI时代对不同类型的工作都有影响，包括流水线工人和创意人才。流水线工人的工作确实面临着被自动化取代的风险，但许多工作也可以通过技术升级而变得更加高效和安全。同时，创意人才的工作虽然在短期内不太可能被完全取代，但AI技术也在逐渐发展，能够辅助创意工作，甚至在某些领域开始取代或增强人类的创造力。因此，无论是流水线工人还是创意人才，都需要适应技术变革，提升自己的技能和能力，以保持职业的稳定性。", "内容立场": "AI时代流水线工人和创意人才的稳定性比较", "作者性设定": {"认知倾向": "分析优先", "表达气质": "理性深刻", "价值倾向": "独立思考", "长期母题": "认知升级"}, "主结构": "认知升级型", "推进方式": "对比推进", "认知模块流": [{"模块": "HOOK", "内容摘要": "在AI浪潮下，流水线工人真的比创意人才更稳定吗？", "功能": "制造停留"}, {"模块": "CASE", "内容摘要": "介绍两个案例：一位流水线工人和一位创意设计师，他们在AI时代的经历和挑战。", "功能": "建立真实感"}, {"模块": "EXPLAIN", "内容摘要": "分析AI技术对流水线工人和创意人才工作的影响，以及它们在稳定性上的不同表现。", "功能": "建立理解"}, {"模块": "MODEL", "内容摘要": "提出一个认知模型，展示技术进步如何影响不同类型工作的未来稳定性。", "功能": "提升认知密度"}, {"模块": "COUNTER", "内容摘要": "提出一个反直觉的观点：在某些情况下，创意人才可能比流水线工人更加稳定。", "功能": "制造记忆点"}, {"模块": "EVIDENCE", "内容摘要": "提供数据支持，例如AI技术对就业市场的影响，以及不同行业的稳定性变化。", "功能": "增强可信度"}, {"模块": "ACTION", "内容摘要": "为个人提供适应AI时代的步骤化行动指南，包括技能提升和职业规划。", "功能": "提供落地"}, {"模块": "BOUNDARY", "内容摘要": "讨论这一命题的适用边界，包括不同行业和地区的差异，以及长期趋势的影响。", "功能": "提升高级感"}], "势能曲线": {"张力变化": ["HOOK - 提出疑问，引发好奇心：在AI时代，流水线工人是否真的比创意人才更稳定？", "CASE - 介绍案例，展示现状：通过两个案例描绘流水线工人和创意设计师在AI时代的生活，引发对稳定性的初步思考。", "EXPLAIN - 分析影响，提供初步答案：分析AI技术如何影响两类工作，开始解答稳定性问题。", "MODEL - 提出模型，深化理解：通过认知模型展示技术进步对不同工作稳定性的影响，为读者提供新的视角。", "COUNTER - 反转观点，引发新的认知：提出创意人才在某些情况下可能更稳定的观点，颠覆读者的预期。", "EVIDENCE - 提供数据，增强可信度：通过数据支持，加强前面观点的可信性，进一步巩固读者的理解。", "ACTION - 提供指南，引导行动：为个人提供适应AI时代的行动指南，将理论转化为实践。", "BOUNDARY - 讨论边界，提升深度：探讨命题的适用边界和长期影响，为读者提供更全面的思考。"], "情绪曲线": ["好奇 - 读者对AI时代下的工作稳定性产生兴趣。", "震惊 - 通过案例展示AI对工作的深刻影响，引发读者的惊讶。", "共鸣 - 分析