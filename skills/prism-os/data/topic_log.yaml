  - {"thesis": "数据显示，2024年科技行业30%的内容创作者岗位被AI替代，但流水线工人岗位只下降5%，反差表明判断力比执行力更难被替代", "candidates_count": 6, "entropy_score": -1, "candidates": [{"title": "打工人的困惑：AI抢饭碗，你离失业还有多远？", "dimension": ""}, {"title": "创意者，你的灵感会被AI取代吗？", "dimension": ""}, {"title": "AI占据创意岗位，流水线工人却仍稳坐钓鱼台？", "dimension": ""}, {"title": "创意岗位被AI取代，流水线工人却意外笑到最后？", "dimension": ""}, {"title": "30%的创作被机器取代，你还在原地踏步吗？", "dimension": ""}], "ccos_outline": {"wechat_cognitive_outline": {"内容目标": "情绪共鸣", "用户动机": "好奇", "核心认知冲突": "实际情况要复杂得多。虽然AI确实在某些领域取代了一些工作，但它也在创造新的就业机会和职业路径。AI技术的发展促进了经济增长，提高了生产效率，并在某些情况下，减轻了人类工作的负担。同时，AI并不能完全替代人类在创意、情感智能和复杂决策方面的能力。因此，虽然AI对就业市场有影响，但这种影响并非全然负面，也不是所有行业和岗位都会受到影响。此外，教育和培训可以帮助劳动力适应这些变化，学习新技能，以适应未来的就业市场需求。", "内容立场": "打工人的困惑：AI抢饭碗，你离失业还有多远？", "作者性设定": {"认知倾向": "分析优先", "表达气质": "理性深刻", "价值倾向": "独立思考", "长期母题": "认知升级"}, "主结构": "认知升级型", "推进方式": "拆解推进", "认知模块流": [{"模块": "HOOK", "内容摘要": "面对AI的崛起，打工人是否该担忧饭碗不保？", "功能": "制造停留"}, {"模块": "CASE", "内容摘要": "讲述一名普通办公室职员在AI技术普及后，如何适应变化并提升自己的工作技能。", "功能": "建立真实感"}, {"模块": "EXPLAIN", "内容摘要": "分析AI技术对不同行业的影响，以及它如何改变工作性质和要求。", "功能": "建立理解"}, {"模块": "MODEL", "内容摘要": "提出一个认知模型，解释AI与人类工作的关系，并预测未来职业市场的变化趋势。", "功能": "提升认知密度"}, {"模块": "COUNTER", "内容摘要": "反驳普遍的AI威胁论，强调AI作为工具的辅助作用和创造新职业机会的可能性。", "功能": "制造记忆点"}, {"模块": "EVIDENCE", "内容摘要": "提供最新的行业报告和统计数据，支撑AI对就业市场的积极影响。", "功能": "增强可信度"}, {"模块": "ACTION", "内容摘要": "提供具体步骤，指导打工人如何通过学习新技能和适应变化来保持职场竞争力。", "功能": "提供落地"}, {"模块": "BOUNDARY", "内容摘要": "讨论AI技术在不同领域的适用边界，以及它对不同人群的影响差异。", "功能": "提升高级感"}], "势能曲线": {"张力变化": ["HOOK模块抛出问题，引发读者对AI抢饭碗的担忧和好奇。", "CASE模块通过真实案例展示AI技术普及后的影响，增加情感共鸣和紧张感。", "EXPLAIN模块提供AI对行业影响的详细分析，缓解部分紧张，给出初步答案。", "MODEL模块通过认知模型解释AI与人类工作的关系，提供新视角，增加认知落差。", "COUNTER模块反转普遍观点，强调AI的积极作用，制造记忆点，缓解情绪。", "EVIDENCE模块提供数据支撑，增强可信度，为读者提供安心感。", "ACTION模块给出具体行动指南，引导读者采取行动，减少不确定性。", "BOUNDARY模块讨论AI的适用边界，提升高级感，为读者提供深度思考。"], "情绪曲线": ["好奇 - 对AI抢饭碗的疑惑和好奇。", "震惊 - 通过案例感受到AI技术的冲击和变化。", "共鸣 - 通过CASE模块的个人故事感同身受。", "清晰 - EXPLAIN和MODEL模块提供清晰的分析和模型，情绪逐渐稳定。", "行动 - ACTION模块激发读者采取行动，情绪转向积极和决心。"], "认知落差设计": "先展示AI带来的威胁（HOOK和CASE模块），再通过EXPLAIN和MODEL模块展示AI的积极影响和未来趋势，最后通过COUNTER和ACTION模块提供解决方案和行动指南。", "节奏变化": "从抽象的概念（HOOK和EXPLAIN模块）转向具体的案例（CASE模块），再到模型和理论（MODEL模块），然后是情绪和观点的反转（COUNTER模块），最后是数据支撑（EVIDENCE模块）和行动指南（ACTION模块），以及对AI适用边界的深入讨论（BOUNDARY模块）。", "认知奖励点": ["HOOK模块提供引人入胜的问题，激发好奇心。", "CASE模块通过真实案例增加情感共鸣。", "EXPLAIN模块提供行业影响分析，增加信息量。", "MODEL模块提出认知模型，提供新视角。", "COUNTER模块反转普遍观点，提供新的认知冲击。", "EVIDENCE模块提供行业报告和统计数据，增强可信度。", "ACTION模块给出具体行动步骤，指导读者如何应对变化。", "BOUNDARY模块讨论AI的适用边界，提供深度思考。"]}, "案例插入点": ["讲述一名普通办公室职员在AI技术普及后，如何适应变化并提升自己的工作技能。"], "信息密度要求": "每段必须有信息增量；禁止同义反复/空洞总结/正确废话/情绪堆砌；强制：真实细节/微观行为/时间感/决策过程/心理变化", "语言风格": "深度 / 理性 / 逻辑严密 / 更像思想产品 / 逻辑推进 / 认知升级 / 信息密度", "Anti-AI要求": "禁止：模板感/套话/平均化表达/AI式升华/空洞口号；强制：观点化表达/人类思考感（犹豫/推演/局部经验/不确定性）", "最终动态认知大纲": "【认知升级型】打工人的困惑：AI抢饭碗，你离失业还有多远？\n通过【拆解推进】推进，\n模块流：HOOK(制造停留) / CASE(建立真实感) / EXPLAIN(建立理解) / MODEL(提升认知密度) / COUNTER(制造记忆点) / EVIDENCE(增强可信度) / ACTION(提供落地) / BOUNDARY(提升高级感)\n张力节奏：好奇 - 对AI抢饭碗的疑惑和好奇。 → 震惊 - 通过案例感受到AI技术的冲击和变化。 → 共鸣 - 通过CASE模块的个人故事感同身受。 → 清晰 - EXPLAIN和MODEL模块提供清晰的分析和模型，情绪逐渐稳定。 → 行动 - ACTION模块激发读者采取行动，情绪转向积极和决心。\n核心张力点：HOOK模块抛出问题，引发读者对AI抢饭碗的担忧和好奇。 / CASE模块通过真实案例展示AI技术普及后的影响，增加情感共鸣和紧张感。 / EXPLAIN模块提供AI对行业影响的详细分析，缓解部分紧张，给出初步答案。"}, "xiaohongshu_cognitive_outline": {"内容目标": "情绪共鸣", "用户动机": "好奇", "核心认知冲突": "实际情况要复杂得多。虽然AI确实在某些领域取代了一些工作，但它也在创造新的就业机会和职业路径。AI技术的发展促进了经济增长，提高了生产效率，并在某些情况下，减轻了人类工作的负担。同时，AI并不能完全替代人类在创意、情感智能和复杂决策方面的能力。因此，虽然AI对就业市场有影响，但这种影响并非全然负面，也不是所有行业和岗位都会受到影响。此外，教育和培训可以帮助劳动力适应这些变化，学习新技能，以适应未来的就业市场需求。", "内容立场": "打工人的困惑：AI抢饭碗，你离失业还有多远？", "作者性设定": {"认知倾向": "分析优先", "表达气质": "理性深刻", "价值倾向": "独立思考", "长期母题": "认知升级"}, "主结构": "认知升级型", "推进方式": "递进推进", "认知模块流": [{"模块": "HOOK", "内容摘要": "AI真的要抢走我们的工作吗？", "功能": "制造停留"}, {"模块": "CASE", "内容摘要": "小张的故事：从传统会计到AI数据分析师的转变", "功能": "建立真实感"}, {"模块": "EXPLAIN", "内容摘要": "AI的兴起：技术进步与职业变革的关联", "功能": "建立理解"}, {"模块": "MODEL", "内容摘要": "职业安全金字塔：评估AI对你工作的影响", "功能": "提升认知密度"}, {"模块": "COUNTER", "内容摘要": "反直觉观点：AI时代下，创造力比技术更珍贵", "功能": "制造记忆点"}, {"模块": "EVIDENCE", "内容摘要": "数据支撑：AI对不同行业就业的影响分析", "功能": "增强可信度"}, {"模块": "ACTION", "内容摘要": "未来技能清单：为AI时代做好准备的五步计划", "功能": "提供落地"}, {"模块": "BOUNDARY", "内容摘要": "认知升级的局限性：AI无法替代的人类特质", "功能": "提升高级感"}], "势能曲线": {"张力变化": ["HOOK：提出问题，引发好奇和担忧，创造初始张力。", "CASE：通过小张的故事提供具体案例，缓解部分张力，同时为下文建立联系。", "EXPLAIN：解释AI技术与职业变革的关系，揭示更多信息，增加张力。", "MODEL：介绍职业安全金字塔模型，为读者提供分析工具，降低张力。", "COUNTER：提出反直觉观点，增加新的认知张力，挑战读者的预期。", "EVIDENCE：通过数据支撑强化观点，减少张力，增强说服力。", "ACTION：提供未来技能清单，解决读者的行动困惑，释放张力。", "BOUNDARY：讨论AI无法替代的人类特质，最终释放所有张力，提供安慰和希望。"], "情绪曲线": ["好奇：HOOK阶段引起读者对AI影响的好奇心。", "震惊：CASE阶段通过小张的故事让读者对AI的影响感到震惊。", "共鸣：EXPLAIN阶段通过技术进步与职业变革的关联让读者产生共鸣。", "清晰：MODEL阶段通过职业安全金字塔模型让读者对AI的影响有更清晰的认识。", "行动：COUNTER和EVIDENCE阶段提供观点和数据，激发读者的行动欲望。", "希望：ACTION阶段提供未来技能清单，给予读者希望和行动的方向。", "满足：BOUNDARY阶段提升高级感，让读者对人类特质的不可替代性感到满足。"], "认知落差设计": "先通过HOOK和CASE引发读者对AI抢饭碗的担忧和震惊，然后通过EXPLAIN和MODEL提供更深入的分析和解决方案，最后通过COUNTER、EVIDENCE和ACTION逐步缓解读者的担忧，提供行动指南和希望。", "节奏变化": "从HOOK的抽象问题提出，到CASE的具体案例分析，再到EXPLAIN和MODEL的模型解释，然后是COUNTER和EVIDENCE的情绪和观点支持，最后是ACTION的行动指导和BOUNDARY的高级感提升，形成抽象→案例→模型→情绪→观点的循环节奏。", "认知奖励点": ["HOOK：引发对AI抢饭碗问题的好奇。", "CASE：小张的故事提供了一个具体的AI影响案例。", "EXPLAIN：技术进步与职业变革的关联提供了对AI影响的新视角。", "MODEL：职业安全金字塔模型提供了一个分析AI影响的工具。", "COUNTER：反直觉观点挑战了读者对AI的预期。", "EVIDENCE：数据支撑增强了对AI影响的可信度。", "ACTION：未来技能清单为读者提供了应对AI时代的行动指南。", "BOUNDARY：讨论AI无法替代的人类特质，提升了文章的高级感。"]}, "案例插入点": ["小张的故事：从传统会计到AI数据分析师的转变"], "信息密度要求": "每段必须有信息增量；禁止同义反复/空洞总结/正确废话/情绪堆砌；强制：真实细节/微观行为/时间感/决策过程/心理变化", "语言风格": "视觉化 / 情绪化 / 可操作 / 更像情绪化信息产品 / 情绪冲击 / 场景代入 / 高频刺激", "Anti-AI要求": "禁止：模板感/套话/平均化表达/AI式升华/空洞口号；强制：观点化表达/人类思考感（犹豫/推演/局部经验/不确定性）", "最终动态认知大纲": "【认知升级型】打工人的困惑：AI抢饭碗，你离失业还有多远？\n通过【递进推进】推进，\n模块流：HOOK(制造停留) / CASE(建立真实感) / EXPLAIN(建立理解) / MODEL(提升认知密度) / COUNTER(制造记忆点) / EVIDENCE(增强可信度) / ACTION(提供落地) / BOUNDARY(提升高级感)\n张力节奏：好奇：HOOK阶段引起读者对AI影响的好奇心。 → 震惊：CASE阶段通过小张的故事让读者对AI的影响感到震惊。 → 共鸣：EXPLAIN阶段通过技术进步与职业变革的关联让读者产生共鸣。 → 清晰：MODEL阶段通过职业安全金字塔模型让读者对AI的影响有更清晰的认识。 → 行动：COUNTER和EVIDENCE阶段提供观点和数据，激发读者的行动欲望。 → 希望：ACTION阶段提供未来技能清单，给予读者希望和行动的方向。 → 满足：BOUNDARY阶段提升高级感，让读者对人类特质的不可替代性感到满足。\n核心张力点：HOOK：提出问题，引发好奇和担忧，创造初始张力。 / CASE：通过小张的故事提供具体案例，缓解部分张力，同时为下文建立联系。 / E