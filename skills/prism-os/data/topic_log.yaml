  - {"thesis": "为什么AI时代，会提问的人比会写代码的人更值钱？", "candidates_count": 9, "entropy_score": -1, "candidates": [{"title": "AI时代，提问力才是金钥匙！", "dimension": ""}, {"title": "写代码不如问问题，AI时代新规则！", "dimension": ""}, {"title": "你还在写代码？AI时代提问才是王道！", "dimension": ""}, {"title": "程序猿注意：为何AI时代会提问成为你的新王牌？", "dimension": ""}, {"title": "AI浪潮下，你提问的能力可能比代码更重要！", "dimension": ""}], "ccos_outline": {"wechat_cognitive_outline": {"内容目标": "认知升级", "用户动机": "好奇", "核心认知冲突": "尽管AI和自动化确实在改变工作性质，但在AI时代，提问力成为了一种关键能力。这是因为AI虽然能够处理大量数据和执行复杂任务，但它们缺乏人类的直觉、创造性思维和对复杂情境的深入理解。提问力允许人们识别问题、挑战假设、探索新的可能性，并引导AI系统更有效地服务于人类的需求。因此，提问力成为了解锁AI潜力和创新的关键，而不仅仅是技术技能。", "内容立场": "在AI时代，如何利用提问力来建立个人优势？", "作者性设定": {"认知倾向": "分析优先", "表达气质": "理性深刻", "价值倾向": "独立思考", "长期母题": "认知升级"}, "主结构": "认知升级型", "推进方式": "递进推进", "认知模块流": [{"模块": "HOOK", "内容摘要": "在AI时代，掌握提问的艺术，成为解锁知识宝藏的金钥匙。", "功能": "制造停留"}, {"模块": "CASE", "内容摘要": "介绍一个成功人士如何通过提问力在AI领域取得突破的案例。", "功能": "建立真实感"}, {"模块": "EXPLAIN", "内容摘要": "分析提问力为何能成为AI时代的金钥匙，以及它如何促进认知升级。", "功能": "建立理解"}, {"模块": "MODEL", "内容摘要": "提出一个认知升级的模型，说明提问力如何影响决策和创新。", "功能": "提升认知密度"}, {"模块": "COUNTER", "内容摘要": "揭示常见误区——认为技术可以替代提问力的重要性。", "功能": "制造记忆点"}, {"模块": "EVIDENCE", "内容摘要": "提供数据和案例来展示提问力在AI时代的重要性和实际效果。", "功能": "增强可信度"}, {"模块": "ACTION", "内容摘要": "提供一系列步骤，指导如何在AI时代提升个人的提问力。", "功能": "提供落地"}, {"模块": "BOUNDARY", "内容摘要": "讨论提问力的适用范围和限制，以及在不同场景下如何调整提问策略。", "功能": "提升高级感"}], "势能曲线": {"张力变化": ["开场冲突"], "情绪曲线": ["好奇"], "认知落差设计": "先破后立", "节奏变化": "递进", "认知奖励点": ["新视角"]}, "案例插入点": ["介绍一个成功人士如何通过提问力在AI领域取得突破的案例。"], "信息密度要求": "每段必须有信息增量；禁止同义反复/空洞总结/正确废话/情绪堆砌；强制：真实细节/微观行为/时间感/决策过程/心理变化", "语言风格": "深度 / 理性 / 逻辑严密 / 更像思想产品 / 逻辑推进 / 认知升级 / 信息密度", "Anti-AI要求": "禁止：模板感/套话/平均化表达/AI式升华/空洞口号；强制：观点化表达/人类思考感（犹豫/推演/局部经验/不确定性）", "最终动态认知大纲": "【认知升级型】AI时代，提问力才是金钥匙！\n通过【递进推进】推进，\n模块流：HOOK(制造停留) / CASE(建立真实感) / EXPLAIN(建立理解) / MODEL(提升认知密度) / COUNTER(制造记忆点) / EVIDENCE(增强可信度) / ACTION(提供落地) / BOUNDARY(提升高级感)\n张力节奏：好奇\n核心张力点：开场冲突"}, "xiaohongshu_cognitive_outline": {"内容目标": "认知升级", "用户动机": "好奇", "核心认知冲突": "尽管AI和自动化确实在改变工作性质，但在AI时代，提问力成为了一种关键能力。这是因为AI虽然能够处理大量数据和执行复杂任务，但它们缺乏人类的直觉、创造性思维和对复杂情境的深入理解。提问力允许人们识别问题、挑战假设、探索新的可能性，并引导AI系统更有效地服务于人类的需求。因此，提问力成为了解锁AI潜力和创新的关键，而不仅仅是技术技能。", "内容立场": "在AI时代，如何利用提问力来建立个人优势？", "作者性设定": {"认知倾向": "分析优先", "表达气质": "理性深刻", "价值倾向": "独立思考", "长期母题": "认知升级"}, "主结构": "认知升级型", "推进方式": "递进推进", "认知模块流": [{"模块": "HOOK", "内容摘要": "在AI时代，提问力成为解锁新知的黄金钥匙。", "功能": "制造停留"}, {"模块": "CASE", "内容摘要": "一个科技公司的案例，展示提问力如何推动创新。", "功能": "建立真实感"}, {"模块": "EXPLAIN", "内容摘要": "分析提问力对于AI时代个体和企业的重要性。", "功能": "建立理解"}, {"模块": "MODEL", "内容摘要": "提出一个提问力驱动的认知升级模型。", "功能": "提升认知密度"}, {"模块": "COUNTER", "内容摘要": "反直觉观点：提问力并不总是显而易见。", "功能": "制造记忆点"}, {"模块": "EVIDENCE", "内容摘要": "展示数据和案例，支持提问力在AI时代的重要性。", "功能": "增强可信度"}, {"模块": "ACTION", "内容摘要": "提供培养提问力的步骤化行动指南。", "功能": "提供落地"}, {"模块": "BOUNDARY", "内容摘要": "讨论提问力的适用边界和局限性。", "功能": "提升高级感"}], "势能曲线": {"张力变化": ["HOOK - 制造停留：以一个引人入胜的问题或谜题开始，制造悬念，让读者好奇接下来会发生什么。", "CASE - 建立真实感：通过科技公司案例，展示提问力的实际应用，解决部分张力，给读者一个具体的答案。", "EXPLAIN - 建立理解：提供深入分析，解释提问力的重要性，进一步释放张力。", "MODEL - 提升认知密度：介绍提问力驱动的认知升级模型，为读者提供新视角，增加张力。", "COUNTER - 制造记忆点：提出反直觉观点，挑战读者的预期，增加新张力。", "EVIDENCE - 增强可信度：通过数据和案例支持提问力的重要性，缓解COUNTER模块产生的张力。", "ACTION - 提供落地：给出具体的行动指南，帮助读者实践提问力，释放最终的张力。", "BOUNDARY - 提升高级感：讨论提问力的适用边界和局限性，为整个话题画上句号，完成张力循环。"], "情绪曲线": ["好奇 - 在HOOK模块，激发读者的好奇心。", "震惊 - 在CASE模块，通过真实案例给读者带来震撼。", "共鸣 - 在EXPLAIN模块，让读者通过深入分析产生共鸣。", "清晰 - 在MODEL模块，通过模型给读者带来清晰的认识。", "行动 - 在ACTION模块，鼓励读者采取行动，激发行动欲。"], "认知落差设计": "先介绍提问力在AI时代的重要性（EXPLAIN），然后提出一个反直觉的观点，即提问力并不总是显而易见的（COUNTER），最后通过实际数据和案例（EVIDENCE）来支持提问力的重要性，形成一个先A后B的认知落差。", "节奏变化": "节奏设计从抽象的概念开始（HOOK），通过具体的案例（CASE）和模型（MODEL）逐渐深入，然后通过情绪和观点（COUNTER和EVIDENCE）增强文章的吸引力，最后提供具体的行动指南（ACTION）和讨论边界（BOUNDARY）来完成循环。", "认知奖励点": ["HOOK - 提出AI时代提问力的新概念。", "CASE - 展示提问力在实际案例中的成功应用。", "MODEL - 提出提问力驱动的认知升级模型。", "COUNTER - 提出反直觉的观点，挑战常规思维。", "EVIDENCE - 提供支持提问力重要性的数据和案例。", "ACTION - 提供具体的行动指南，帮助读者实践提问力。"]}, "案例插入点": ["一个科技公司的案例，展示提问力如何推动创新。"], "信息密度要求": "每段必须有信息增量；禁止同义反复/空洞总结/正确废话/情绪堆砌；强制：真实细节/微观行为/时间感/决策过程/心理变化", "语言风格": "视觉化 / 情绪化 / 可操作 / 更像情绪化信息产品 / 情绪冲击 / 场景代入 / 高频刺激", "Anti-AI要求": "禁止：模板感/套话/平均化表达/AI式升华/空洞口号；强制：观点化表达/人类思考感（犹豫/推演/局部经验/不确定性）", "最终动态认知大纲": "【认知升级型】AI时代，提问力才是金钥匙！\n通过【递进推进】推进，\n模块流：HOOK(制造停留) / CASE(建立真实感) / EXPLAIN(建立理解) / MODEL(提升认知密度) / COUNTER(制造记忆点) / EVIDENCE(增强可信度) / ACTION(提供落地) / BOUNDARY(提升高级感)\n张力节奏：好奇 - 在HOOK模块，激发读者的好奇心。 → 震惊 - 在CASE模块，通过真实案例给读者带来震撼。 → 共鸣 - 在EXPLAIN模块，让读者通过深入分析产生共鸣。 → 清晰 - 在MODEL模块，通过模型给读者带来清晰的认识。 → 行动 - 在ACTION模块，鼓励读者采取行动，激发行动欲。\n核心张力点：HOOK - 制造停留：以一个引人入胜的问题或谜题开始，制造悬念，让读者好奇接下来会发生什么。 / CASE - 建立真实感：通过科技公司案例，展示提问力的实际应用，解决部分张力，给读者一个具体的答案。 / EXPLAIN - 建立理解：提供深入分析，解释提问力的重要性，进一步释放张力。"}}, "timestamp": "2026-06-02T13:28:28.142686"}
